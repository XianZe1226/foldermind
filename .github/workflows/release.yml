name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            bundleArgs: --bundles dmg
          - os: windows-latest
            bundleArgs: --bundles nsis
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: FolderMind ${{ github.ref_name }}
          releaseBody: |
            Automated release for FolderMind.

            Included artifacts:
            - macOS installer
            - Windows x86_64 installer
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.bundleArgs }}
